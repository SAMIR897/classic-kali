name: Rust Build and Upload

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # 1. Compile the single Rust file directly with optimization
    - name: Compile with rustc
      run: rustc classickali.rs -O -o classickali
      
    # 2. Upload the compiled binary so you can download it
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: classic-kali-executable
        path: classickali
